<script>
function first() {
    return new Promise ((resolve)=>{
        let first_line = document.createElement("h3")
        document.body.append(first_line)

        let dots = ""

        let interval = setInterval(() => {
            dots += "."
            if (dots === "....") dots = ""
            first_line.innerText = "Initializing Hacking" + dots
        }, 300)

        setTimeout(() => {
            clearInterval(interval)
            first_line.innerText = "Initializing Hacking complete"
            resolve()
        }, 5000);
    })
}
