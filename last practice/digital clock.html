<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .clock{
        margin-top: 10vh;
        margin-left: 10%;
        margin-right: 10%;
        padding-top: 2vh;
        padding-bottom: 2vh;
        background-color: beige;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: 1px solid rgb(255, 255, 142);
        border-radius: 50px;
        font-size: 3.5rem;
        
    }

    span{
        margin-bottom: 30px;
    }
    .time,.date{
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 5px;
        border: 2px solid black;
        width: 40vw;
        height: 10vh;
        margin: 5px;
        border-radius: 20px;
        font-size: 2.5rem;
    }
</style>
<body>
    <div class="clock">
        <span>Digital Clock</span>
        <div class="time">

        </div>
        <div class="date">

        </div>
    </div>
</body>
</html>

<script>
    function clock(){
    let now = new Date()
    let hr = now.getHours()
    let min = now.getMinutes()
    let sec =now.getSeconds()
    let fullTime = `${hr}:${min}:${sec}`
    let dated = now.getDate()
    let mon = now.getMonth()+1
    let year= now.getFullYear()
    let fullDate = `${dated} / ${mon} / ${year}`
    let timing = document.getElementsByClassName("time")
    let date = document.getElementsByClassName("date")
    timing[0].innerText=(fullTime)
    date[0].innerText=(fullDate)
    }
    setInterval(() => {
        clock()
    }, 1000);
</script>
