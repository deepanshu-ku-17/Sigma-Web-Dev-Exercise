<script>
    let input = prompt("Enter the S or W or G")
    input= input.toUpperCase()
    console.log(input)
    let ran = Math.floor(Math.random()*(3-1+1))+1
    let comp;
    if(ran===1){
        comp = "S"
    }
    else if(ran===2){
        comp = "W"
    }
    else if(ran===3){
        comp = "G"
    }
    else{confirm("Error in random number genrate")}
    console.log(comp)

    if(input===comp){
        confirm("Match draw")
    }
    else if ((input === "S" && comp === "W") ||
            ( input === "W" && comp === "G") ||
            ( input === "G" && comp === "S")){
        confirm("You won")
    }
    else{
        confirm("You loose")
    }
</script>
