<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        border:2px solid rgba(110, 23, 23, 0.671);
        height: 50vh;
        width: 40%;
        margin: 24vh;
        position:sticky;
        left: 30%;
        background-color: #cf4f4f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 30px;
    }

    .clock{
        border:2px solid rgba(255, 195, 121, 0.598);
        background-color: bisque;
        font-size: 2rem;
        font-weight: bold;
        height: 20%;
        width: 80%;
        margin: 5%;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .alarm{
        border:2px solid rgba(70, 204, 222, 0.683) ;
        border-radius: 30px;
        background-color: powderblue;
        font-size: 2rem;
        font-weight: bold;
        height: 10%;
        width: 40%;
        margin: 5%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .alarm input{
        height: 50%;
        width: 30%;
        margin: 10px;
        border-radius: 10px;
    }

    span{
        font-size: 2rem;
        font-weight: bolder;
    }

</style>
<body>
    <div class="box">
        <span>Current Time</span>
        <div class="clock">
        </div>
        <span>Set your Alarm</span>
        <div class="alarm">
            <input type="time" name="time" id="alarmInput">
            <input type="button" value="Set" id="btn">
        </div>
    </div>
</body>
</html>

<script>
    function currentTime() {
        let now= new Date()
        let curr_hr = now.getHours()
        curr_hr = curr_hr < 10 ? "0"+curr_hr : curr_hr

        let curr_min = now.getMinutes()
        curr_min = curr_min < 10 ? "0"+curr_min : curr_min

        let curr_sec = now.getSeconds()
        curr_sec = curr_sec < 10 ? "0"+curr_sec : curr_sec

        let curr_time= `${curr_hr}:${curr_min}:${curr_sec}`
        return curr_time
    }

    function displayTime() {
        document.getElementsByClassName("clock")[0].innerText=(currentTime())
    }

    let alarmTime=null
    document.getElementById("btn").onclick=()=>{
        alarmTime = document.getElementById("alarmInput").value
    }
    setInterval(() => {
        displayTime()
        
        let cur=currentTime().slice(0,5)

        if(alarmTime===cur){
            alert("time ho gya")
            alarmTime=null
        }
    }, 1000);
</script>
