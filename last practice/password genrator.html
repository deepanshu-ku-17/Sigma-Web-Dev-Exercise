<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="box"></div>
</body>
</html>

<script>
    while(true){
        let input= Number(prompt("Enter the length of your password. It should be a more than 4"))
        if(input<4){
            alert("Na manna karu guddi laal.")
        }
        else{
            let password="",capital,smaller,number,symbol,outerchoice,mainRandom4=[],shuffle,suffleArray;

            number = Math.floor(Math.random()*10)
            mainRandom4.push(number)

            capital= Math.floor(Math.random()*(90-65+1))+65
            mainRandom4.push(String.fromCharCode(capital))


            smaller= Math.floor(Math.random()*(122-97+1))+97
            mainRandom4.push(String.fromCharCode(smaller))

            symbol= Math.floor(Math.random()*(47-33+1))+33
            mainRandom4.push(String.fromCharCode(symbol))

            console.log(mainRandom4)

            for (let index = 3; index >= 0; index--) {
                shuffle = Math.floor(Math.random()*(index-0+1))
                let temp = mainRandom4[index]
                mainRandom4[index] = mainRandom4[shuffle]
                mainRandom4[shuffle] = temp
            }
            password += mainRandom4.join("")
            console.log(password)

            for (let index = 0; index < input-4; index++) {
                outerchoice=Math.floor(Math.random()*4)+1
                switch (outerchoice) {
                    case 1:
                        number = Math.floor(Math.random()*10)+0
                        password+=number
                        break;

                    case 2:
                        capital= Math.floor(Math.random()*(90-65+1))+65
                        password+=String.fromCharCode(capital)
                        break;

                    case 3:
                        smaller= Math.floor(Math.random()*(122-97+1))+97
                        password+=String.fromCharCode(smaller)
                        break;

                    case 4:
                        symbol= Math.floor(Math.random()*(47-33+1))+33
                        password+=String.fromCharCode(symbol)
                        break;
                
                    default:
                        break;
                }
            }
            document.querySelector(".box").append(password)
            break;
        }
    }
</script>
