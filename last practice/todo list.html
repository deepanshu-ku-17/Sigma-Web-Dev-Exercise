<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #main{
        border: 2px solid rgba(0, 0, 0, 0.418);
        padding: 5px;
        border-radius: 10px;
    }
    #bar{
        border: 1px solid black;
        padding: 5px;
        border-radius: 10px;
        margin: 10px;
    }
    #todolist{
        border: 1px solid black;
        padding: 5px;
        border-radius: 10px;
    }

    input{
        width: 40vw;
    }

    li{
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: space-around;
}
</style>
<body>
    <div id="main">
        <div id="bar">
            <input type="text" value="">
            <button>ADD</button>
        </div>
        <div id="todolist">
            <h3>HERE IS YOUR TO DO LIST</h3>
            <ul class="list"></ul>
        </div>
    </div>
</body>
</html>

<script>
let add = document.getElementsByTagName("button")[0]
let ul = document.getElementsByClassName("list")[0]
let input = document.getElementsByTagName("input")[0]

// 🧠 Load data
let tasks = JSON.parse(localStorage.getItem("tasks")) || []

// 🔁 Render function
function render(){
    ul.innerHTML = ""

    tasks.forEach((task, index) => {
        let li = document.createElement("li")

        let span = document.createElement("span")
        span.innerText = task.text

        let done = document.createElement("input")
        done.type = "checkbox"
        done.checked = task.done

        let deleted = document.createElement("button")
        deleted.innerText = "Delete"

        // ✅ checkbox toggle
        done.onclick = () => {
            task.done = done.checked
            save()
            render()
        }

        // ❌ delete
        deleted.onclick = () => {
            tasks.splice(index, 1)
            save()
            render()
        }

        // 🎨 style
        if(task.done){
            span.style.color = "rgba(0,0,0,0.5)"
            span.style.textDecoration = "line-through"
            span.style.fontWeight = "600"
        }

        li.append(done, span, deleted)
        ul.append(li)
    })
}

// 💾 save function
function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks))
}

// ➕ add task
add.onclick = () => {
    let work = input.value

    if(work === ""){
        alert("kaam to bta de ")
    }
    else{
        tasks.push({
            text: work,
            done: false
        })

        input.value = ""
        save()
        render()
    }
}

// 🚀 initial load
render()
</script>
