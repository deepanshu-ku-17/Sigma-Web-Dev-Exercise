<script>
    function dynamic() {
        return new Promise((resolve, reject)=>{
        console.log("file creation start...")
        let file = document.createElement("script")
        file.src = "practiceset9.2.js"
        console.log("file loading...")
        file.onload=()=>resolve("file load ho gyi")
        file.onerror=()=>reject("file load he nhi hua")
        document.body.append(file)
        });
    }
    async function main() {
        let ans = await dynamic()
        alert(`${ans} `)
    }
    main()
</script>
