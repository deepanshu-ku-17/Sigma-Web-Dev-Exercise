<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .bulb{
        height: 200px;
        width: 200px;
        border: 2px solid black;
        margin: 5px;
        background-color: transparent;
        box-shadow: none;
    }

    .on-off{
        background-color: yellow;
        box-shadow: 0 0 40px rgb(255, 255, 163);
    }
</style>
<body>
    <div class="bulb on-off"></div>
    <button id="on">ON/OFF</button>
</body>
</html>

<script>
    let div = document.getElementsByClassName("bulb")[0]
    let btn = document.getElementById("on")
    btn.addEventListener("click", function glow(){
        div.classList.toggle("on-off")
    })
</script>
