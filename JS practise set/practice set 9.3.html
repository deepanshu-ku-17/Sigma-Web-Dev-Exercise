<script>
    function createPromise(){
        return new Promise((resolve,reject)=>{
            let result= false
            setTimeout(() => {
                if (result== true) {
                    resolve("request accept ")
                } else {
                    reject("request rejected")
                }
            }, 3000);
        })
    }
    async function main() {
        try {
            let ans = await createPromise()
            console.log(ans)
        } catch (error) {
            console.log(error)
        }
    }
    main()
</script>
