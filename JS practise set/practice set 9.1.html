<script>
    function dynamic(){
        return new Promise((resolve, reject)=>{
            console.log("file loading is start...")
            let file = document.createElement('script')
            file.src="practice set 9.1.js"
            setTimeout(() => {
                file.onload=()=>resolve("file aa chuki hai")
                file.onerror=()=>reject("nahi hu")
                document.body.append(file)
            }, 2000);
        });
    }

dynamic()
    .then((msg)=>{
        alert("file hai bhai")
    })
    .catch((err)=>{
        console.log(err)
    })
</script>
