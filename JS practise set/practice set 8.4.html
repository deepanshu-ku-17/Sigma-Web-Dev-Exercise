<script>
    function random_data_push(){
        let num =Math.floor( Math.random()*(10-0+1)+0)
        let body =document.getElementsByTagName("body")[0]
        body.style.backgroundColor="red"
        body.style.fontSize="5rem"
        body.innerHTML = ""
        body.append(num)
    }

    function fetch_data(){
        let body = document.getElementsByTagName("body")[0]
        let fetch = body.innerText
        console.log(fetch)
    }
    setInterval(random_data_push,5000)
    setInterval(fetch_data,5000)
</script>
